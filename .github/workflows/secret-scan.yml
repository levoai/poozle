name: Secrets Scan TruffleHog to DefectDojo

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # Weekly scan

jobs:
  trufflehog-secrets:
    runs-on: ubuntu-latest
    continue-on-error: true  # Never block PRs

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for history scanning

      - name: Scan with TruffleHog (Docker – verified only)
        run: |
          docker run --rm \
            -v "${PWD}:/pwd" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///pwd \
            --results=verified \
            --json \
            --no-update \
            > trufflehog-results.jsonl || true
            
      - name: Verify output
        run: |
          if [ ! -s trufflehog-results.json ]; then
            echo "No secrets found or empty output"
          else
            echo "TruffleHog results generated"
          fi

      - name: Upload results to DefectDojo
        if: always()
        run: |
          if [ ! -s trufflehog-results.json ]; then
            echo "Skipping DefectDojo upload (no results)"
            exit 0
          fi

          curl --fail-with-body -sS -L \
            -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_API_KEY }}" \
            -H "Accept: application/json" \
            -F "scan_type=Trufflehog Scan" \
            -F "file=@trufflehog-results.json" \
            -F "product=${{ secrets.TRUFFLEHOG_PRODUCT_ID }}" \
            -F "engagement=${{ secrets.TRUFFLEHOG_ENGAGEMENT_ID }}" \
            -F "scan_date=$(date +%F)" \
            -F "verified=true" \
            -F "active=true"
